<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobremesas</title>
    <link rel="stylesheet" href="cardapio.css">
</head>

<body style="padding: 20px" ;>
    <h1>Sobremesas</h1>
    <div class="principal">
        <div class="card">
            <img src="img/gelatina.jpeg" alt="gelatina">
            <h2>Gelatina colorida</h2>
            <p class="descricao">simples, infantil, vende MUITO</p>
            <p class="preco">R$3,90</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="card">
            <img src="img/boloCenoura.jpeg" alt="boloCenoura">
            <h2>Bolo de Cenoura</h2>
            <p class="descricao">caseiro = conexão emocional</p>
            <p class="preco">R$5,90</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="img/arrozdoce.jpeg" alt="arrozdoce">
            <h2>Arroz Doce</h2>
            <p class="descricao"> conforto + custo baixo</p>
            <p class="preco">R$6,90</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="img/mousse.jpeg" alt="mousse">
            <h2>Mousse</h2>
            <p class="descricao"> barato, fácil, margem boa</p>
            <p class="preco">R$7,90</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="img/pudim.jpeg" alt="pudim">
            <h2>Pudim de leite</h2>
            <p class="descricao">rei das sobremesas, não tem erro</p>
            <p class="preco">R$8,90</p>
            <button class="comprar">Comprar</button>
        </div>

    </div>
</body>

</html>
