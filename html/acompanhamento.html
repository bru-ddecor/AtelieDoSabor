<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acompanhamento</title>
    <link rel="stylesheet" href="../css/cardapio.css">
</head>
<body style="padding: 20px;">

     <!-- Acompanhamentos  -->
     <h1>Acompanhamento</h1>
    <div class="principal">
        <!-- Cards dos acompanhamentos -->
        <div class="card">
            <img src="../css/img/arroz.jpeg" alt="arroz">
            <h2>Arroz</h2>
            <p class="preco">R$3,00</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="card">
            <img src="../css/img/feijão.jpeg" alt="feijão">
            <h2>Feijão</h2>
            <p class="preco">R$3,50</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/salada.jpeg" alt="salada">
            <h2>Salada</h2>
            <p class="preco">R$4,00</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/batata.jpeg" alt="batata">
            <h2>Batata Frita</h2>
            <p class="preco">R$5,00</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/farofa.jpeg" alt="farofa">
            <h2>Farofa</h2>
            <p class="preco">R$3,00</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/Macarrao.jpeg" alt="Macarrao">
            <h2>Macarrão</h2>
            <p class="preco">R$5,50</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/couve.jpeg" alt="couve">
            <h2>Couve</h2>
            <p class="preco">R$4,50</p>
            <button class="comprar">Comprar</button>
        </div>

    </div>
</body>
</html>
