<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratos Principais</title>
    <link rel="stylesheet" href="../css/cardapio.css">
</head>

<body style="padding: 20px" ;>
    <!-- PRATOS PRINCIPAIS -->
    <h1>Pratos Principais</h1>
    <div class="principal">
        <div class="card">
            <img src="../css/img/refrigerante.jpeg" alt="refrigerante">
            <h2>Refrigerantes</h2>
            <p class="descricao">Refrigerantes - Coca-cola, Fanta uva, Fanta Laranja e Guaraná</p>
            <p class="preco">R$7,00</p>
            <button class="comprar">Comprar</button>
        </div>

        <div class="card">
            <img src="../css/img/suco_limao.jpeg" alt="suco">
            <h2>Suco de limão</h2>
            <p class="descricao">Suco de limão, copo de 500ml</p>
            <p class="preco">R$5,00</p>
            <button class="comprar">Comprar</button>
        </div>
        <div class="card">
            <img src="../css/img/suco_melancia.jpeg" alt="suco_melancia">
            <h2>Suco de Melancia</h2>
            <p class="descricao">Suco de melancia, copo 500ml</p>
            <p class="preco">R$5,00</p>
            <button class="comprar">Comprar</button>
        </div>

    </div>
</body>

</html>
